<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AJAX 특징 실습</title>
    <style>
      pre {
        background-color: #f0f0f0;
        padding: 10px;
        border-radius: 5px;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>async await 문제</h1>

    <pre id="result"></pre>

    <script>
      /*
        문제 1.순차 실행

        설명:
        1)fetchData라는 비동기 함수가 있습니다.
        2)1초 후 데이터를 반환하는 함수입니다.
        3)main 함수 안에서 async/await를 이용해 순차적으로 데이터를 가져와 출력하세요.

        실행 예시:
        데이터 1
        데이터 2
        */

      //코드 틀

      function fetchData(id) {
        return new Promise((resolve) => {
          setTimeout(() => resolve(`데이터 ${id}`), 1000);
        });
      }

      async function main() {
        // 여기에 작성
        const data1 = await fetchData(1);
        document.getElementById('result').textContent += `${data1}\n`;
        console.log(data1);

        const data2 = await fetchData(2);
        document.getElementById('result').textContent += `${data2}\n`;
        console.log(data2);

        // 병렬 실행, 소요 시간: 1초
        const [data3, data4] = await Promise.all([fetchData(3), fetchData(4)]);
        document.getElementById('result').textContent += `${data3}\n${data4}\n`;
        console.log(data3);
        console.log(data4);
      }

      main();
    </script>
  </body>
</html>
