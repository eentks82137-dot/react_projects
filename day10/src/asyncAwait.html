<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async/Await</title>
  </head>
  <body>
    <h1>콜백지옥 | 프로미스 | async/await</h1>

    <button onclick="runCallBackHell()">Run Callback Hell</button>
    <button onclick="runPromise()">Run Promise</button>
    <button onclick="runAsyncAwait()">Run Async/Await</button>
  </body>

  <script>
    const runCallBackHell = () => {
      setTimeout(() => {
        console.log('Step 1');
        setTimeout(() => {
          console.log('Step 2');
          setTimeout(() => {
            console.log('Step 3');
            // 콜백 지옥
          }, 1000);
        }, 1000);
      }, 1000);
    };

    const runPromise = () => {
      console.log('Promise 시작');
      new Promise((resolve) => setTimeout(resolve, 1000))
        .then(() => {
          console.log('Step 1');
          return new Promise((resolve) => setTimeout(resolve, 1000));
        })
        .then(() => {
          console.log('Step 2');
          return new Promise((resolve) => setTimeout(resolve, 1000));
        })
        .then(() => {
          console.log('Step 3');
        });
    };
    const runAsyncAwait = async () => {
      console.log('async/await 시작');
      await new Promise((resolve) => setTimeout(resolve, 1000));
      console.log('Step 1');
      await new Promise((resolve) => setTimeout(resolve, 1000));
      console.log('Step 2');
      await new Promise((resolve) => setTimeout(resolve, 1000));
      console.log('Step 3');
    };
  </script>
</html>
