<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch 고급 특징 실습</title>
  </head>
  <body>
    <h1>Fetch 고급 특징 3가지 실습</h1>

    <button onclick="example1()">1. HTTP 오류는 reject가 아니다</button
    ><br /><br />
    <button onclick="example2()">2. response.json()은 한 번만 사용 가능</button
    ><br /><br />
    <button onclick="example3()">3. JSON 변환도 비동기</button><br /><br />

    <input type="number" name="id" id="idInput" min="1" value="1" />
    <button onclick="example4()">4. 게시글 가져오기</button>
    <button onclick="example5()">5. 게시글 가져오기</button>

    <div id="output">
      <pre><Strong>Message: </Strong><span id="message"></span></pre>
      <pre><Strong>Id: </Strong><span id="id"></span></pre>
      <pre><Strong>Title: </Strong><span id="title"></span></pre>
      <pre><Strong>UserId: </Strong><span id="userId"></span></pre>
      <pre><Strong>Body: </Strong><span id="body"></span></pre>
    </div>
    <script>
      /* ===============================================================
           1. HTTP 에러도 reject 아님
           ---------------------------------------------------------------
           fetch는 "네트워크 자체가 끊긴 경우"만 reject가 발생함.

           즉,
           ✔ 404 Not Found → catch 실행 X
           ✔ 500 Server Error → catch 실행 X
           반대로,
           ✔ 인터넷 끊김 / DNS 실패 → catch 실행

           그래서 HTTP 에러를 잡으려면 response.ok를 반드시 검사해야 한다.
        =============================================================== */
      function example1() {
        console.log('---- 1번 예제 시작 ----');

        fetch('https://jsonplaceholder.typicode.com/INVALID_URL')
          // 존재하지 않는 endpoint → HTTP 에러 404 발생
          .then((response) => {
            console.log('response.status:', response.status); // 404
            console.log('response.ok:', response.ok); // false

            // HTTP 에러지만 catch가 실행되지 않는다!
            // 그러므로 반드시 ok 체크 필요
            if (!response.ok) {
              throw new Error('HTTP 오류 발생! 상태코드: ' + response.status);
            }
            return response.json();
          })
          .then((data) => {
            console.log('데이터:', data);
          })
          .catch((error) => {
            console.error('catch 실행됨:', error.message);
          });
      }

      /* ===============================================================
           2. response.json()은 단 한 번만 호출 가능
           ---------------------------------------------------------------
           response.body는 "스트림(stream)"이다.
           JSON 변환은 스트림을 '읽는 과정'이므로 한 번 읽으면 끝.

           두 번째 json() 호출 시 에러 발생:
           → TypeError: body stream already read
        =============================================================== */
      function example2() {
        console.log('---- 2번 예제 시작 ----');

        fetch('https://jsonplaceholder.typicode.com/posts/1')
          .then((response) => {
            // 첫 번째 json() 정상 작동
            const first = response.json();
            console.log('첫 번째 JSON 파싱:', first);

            // 두 번째 json() → 스트림이 이미 읽혀 오류 발생
            const second = response.json(); // 에러
            console.log('두 번째 JSON 파싱:', second);

            return first;
          })
          .then((data) => console.log('결과:', data))
          .catch((error) => console.error('catch 실행됨:', error));
      }

      /* ===============================================================
           3. JSON 변환도 비동기 → Promise 반환
           ---------------------------------------------------------------
           response.json()은 즉시 JSON을 반환하지 않는다.
            내부적으로 스트림을 읽는 작업이 비동기로 이루어짐
            따라서 Promise 형태로 반환됨

           → 반드시 .then() 또는 await 사용해야 한다.
        =============================================================== */
      function example3() {
        console.log('---- 3번 예제 시작 ----');

        fetch('https://jsonplaceholder.typicode.com/users/1')
          .then((response) => {
            // json()은 Promise를 반환함
            const jsonPromise = response.json();
            console.log('response.json() 반환값:', jsonPromise);

            // 여기에서는 아직 데이터가 완성되지 않음
            return jsonPromise; // 다음 then에서 처리됨
          })
          .then((data) => {
            console.log('파싱된 JSON 데이터:', data);
          });
      }

      // 오류 발생시 오류가 제대로 try catch 문으로 분기할 수 있도록 코드 수정하기
      function example4() {
        const output = document.getElementById('output');
        const idInput = document.getElementById('idInput');
        const id = idInput.value.trim();
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`)
          .then((response) => {
            // HTTP 에러 체크, catch로 넘어가도록 예외 발생
            if (!response.ok) {
              throw new Error('HTTP 오류 발생! 상태코드: ' + response.status);
            }
            return response.json();
          })
          .then((data) => {
            writeOutput(data, output);
          })
          .catch((error) => {
            writeError(error, output);
          });
      }

      async function example5() {
        const output = document.getElementById('output');
        const idInput = document.getElementById('idInput');
        const id = idInput.value.trim();
        const response = await fetch(
          `https://jsonplaceholder.typicode.com/posts/${id}`,
        );
        try {
          if (!response.ok) {
            throw new Error('HTTP 오류 발생! 상태코드: ' + response.status);
          }
          const data = await response.json();
          writeOutput(data, output);
        } catch (error) {
          writeError(error, output);
          return;
        }
      }

      function writeOutput(data, out) {
        out.querySelector('#message').textContent =
          '데이터를 성공적으로 가져왔습니다!';
        out.querySelector('#id').textContent = data.id;
        out.querySelector('#title').textContent = data.title;
        out.querySelector('#userId').textContent = data.userId;
        out.querySelector('#body').textContent = data.body;
      }

      function writeError(error, out) {
        console.error('데이터를 가져오는 중 오류 발생:', error);
        out.querySelector('#message').textContent =
          '데이터를 가져오는 중 오류가 발생했습니다. ' + error.message;
        out.querySelector('#id').textContent = '';
        out.querySelector('#title').textContent = '';
        out.querySelector('#userId').textContent = '';
        out.querySelector('#body').textContent = '';
      }
    </script>
  </body>
</html>
